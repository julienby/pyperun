<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pyperun · Connexion</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/theme.css">
</head>
<body class="min-h-screen bg-grid flex items-center justify-center p-6">

  <div class="card w-full max-w-sm p-8">
    <div class="flex items-center gap-3 mb-8">
      <div class="w-10 h-10 rounded-lg flex items-center justify-center" style="background:var(--accent)">
        <span class="mono font-bold text-sm" style="color:var(--bg-deep)">P</span>
      </div>
      <div>
        <h1 class="text-lg font-semibold">Pyperun</h1>
        <p class="text-xs muted">Pipeline IoT · opérateur</p>
      </div>
    </div>

    <form id="login-form" class="space-y-4">
      <div>
        <label class="field-label">Email</label>
        <input type="email" id="email" class="input w-full" placeholder="operateur@example.fr" required>
      </div>
      <div>
        <label class="field-label">Token API</label>
        <input type="password" id="token" class="input w-full mono" placeholder="PYPERUN_TOKEN" required>
      </div>
      <button type="submit" class="btn btn-primary w-full justify-center mt-2">Se connecter</button>
    </form>

    <p class="text-xs mt-6 text-center muted">
      Token partagé UI · REST · MCP<br>
      <span class="mono">Authorization: Bearer …</span>
    </p>
  </div>

  <script src="js/pyperun.js"></script>
  <script>
    if (Pyperun.getToken()) location.href = 'dashboard.html';
    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      Pyperun.setToken(document.getElementById('token').value);
      location.href = 'dashboard.html';
    });
  </script>
</body>
</html>
