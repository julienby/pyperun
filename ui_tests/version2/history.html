<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pyperun · History</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <link rel="stylesheet" href="css/theme.css">
</head>
<body class="bg-grid" onload="Pyperun.requireAuth()">

<div class="app" data-page="history">
  <div class="main">

    <header class="topbar">
      <h1 class="topbar-title">History</h1>
      <select class="input"
        hx-get="/api/runs?flow=stab97&limit=20"
        hx-target="#runs-list"
        hx-trigger="change, load">
        <option value="stab97" selected>stab97</option>
        <option value="my-experiment">my-experiment</option>
        <option value="nightly-backfill">nightly-backfill</option>
      </select>
      <select class="input">
        <option>Tous statuts</option>
        <option>success</option>
        <option>error</option>
      </select>
    </header>

    <main class="content flush">
      <div class="flex flex-col lg:flex-row lg:h-full lg:overflow-hidden">

        <!-- O5 : liste runs paginée -->
        <div class="lg:w-96 shrink-0 flex flex-col border-b lg:border-b-0 lg:border-r bordered">
          <div class="card-head">Runs · list_runs (O5)</div>
          <div id="runs-list" class="lg:flex-1 lg:overflow-auto divide-border">
            <button class="w-full text-left px-4 py-3 hover:bg-white/5 transition"
              style="background:rgba(245,158,11,0.06)"
              hx-get="fragments/run-events.html"
              hx-target="#run-detail-events"
              hx-swap="innerHTML">
              <div class="flex justify-between items-center">
                <span class="mono text-sm font-medium accent">a1b2c3d4</span>
                <span class="badge badge-running text-[10px]">running</span>
              </div>
              <div class="text-xs mt-1 muted">08/06 06:00 · 3m 41s · 3/9</div>
            </button>
            <button class="w-full text-left px-4 py-3 hover:bg-white/5"
              hx-get="/api/runs/f9e8d7c6/events"
              hx-target="#run-detail-events"
              hx-swap="innerHTML">
              <div class="flex justify-between items-center">
                <span class="mono text-sm">f9e8d7c6</span>
                <span class="badge badge-success text-[10px]">ok</span>
              </div>
              <div class="text-xs mt-1 muted">07/06 06:00 · 3m 18s · 9/9</div>
            </button>
            <button class="w-full text-left px-4 py-3 hover:bg-white/5">
              <div class="flex justify-between items-center">
                <span class="mono text-sm">b2c3d4e5</span>
                <span class="badge badge-error text-[10px]">error</span>
              </div>
              <div class="text-xs mt-1 muted">06/06 06:00 · 6m 52s · to_postgres</div>
            </button>
            <button class="w-full text-left px-4 py-3 hover:bg-white/5">
              <div class="flex justify-between items-center">
                <span class="mono text-sm">c1d2e3f4</span>
                <span class="badge badge-success text-[10px]">ok</span>
              </div>
              <div class="text-xs mt-1 muted">05/06 06:00 · 3m 05s · 9/9</div>
            </button>
          </div>
          <div class="px-4 py-2 border-t bordered flex justify-between text-xs">
            <button class="btn btn-ghost btn-sm"
              hx-get="/api/runs?flow=stab97&offset=20"
              hx-target="#runs-list"
              hx-swap="beforeend">← Plus ancien</button>
            <span class="muted self-center">20 / 142</span>
          </div>
        </div>

        <!-- O4 : drill-down événements -->
        <div class="flex-1 flex flex-col lg:overflow-hidden">
          <div class="px-4 py-3 border-b bordered elevated">
            <div class="flex flex-wrap items-center gap-3">
              <span class="mono font-medium accent">a1b2c3d4</span>
              <span class="badge badge-running">running</span>
              <span class="text-xs muted">stab97 · 08/06/2026 06:00:01 → …</span>
              <button class="btn btn-success btn-sm ml-auto"
                hx-post="/api/run/stab97"
                hx-vals='{"retry_from":"a1b2c3d4"}'
                hx-swap="none">↻ Retry (A6)</button>
            </div>
            <div id="chart-duration-sparkline" class="mt-3"></div>
          </div>

          <div class="lg:flex-1 lg:overflow-auto p-4">
            <h3 class="text-xs font-medium mb-3 muted">Événements · get_run_events (O4)</h3>
            <div id="run-detail-events"
              hx-get="fragments/run-events.html"
              hx-trigger="load"
              hx-swap="innerHTML">
            </div>
          </div>

          <div class="p-4 border-t bordered">
            <h3 class="text-xs font-medium mb-2 muted">Timeline runs (Plotly Gantt)</h3>
            <div id="chart-run-timeline" class="h-40"></div>
          </div>
        </div>

      </div>
    </main>
  </div>
</div>

<script src="js/pyperun.js"></script>
<script src="js/layout.js"></script>
<script src="js/charts.js"></script>
</body>
</html>
